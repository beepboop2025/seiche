name: publish

# Palimpsest-style serverless publish: run the seven engines on a cron,
# bake the snapshot into the static build, deploy to Cloudflare Pages.
# Data cadence is daily, so 4-hourly snapshots lose nothing.

on:
  schedule:
    - cron: "23 2,6,10,14,18,22 * * *"   # every 4h, offset minute
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: publish
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend
        run: pip install -e "./backend[dev]"

      - name: Engine tests (publish gates on green)
        run: python -m pytest backend/tests -q --memray --pystack-threshold=300

      - name: Run engines, export snapshot
        run: python backend/scripts/export_public.py frontend/public/data/public.json frontend/public/data/overview.json

      # The Book's ledger: pull the previously published hash-chained history
      # from the live site, verify it, append today's as-published record.
      # The site repo's git history is the append-only backbone.
      - name: Append Book record (hash-chained ledger)
        run: |
          # -L: github.io 301s to the seiche.info custom domain since 2026-07-09
          curl -sfL https://seiche.info/data/book_history.json \
            -o /tmp/book_history.json || echo "[]" > /tmp/book_history.json
          python backend/scripts/append_book_record.py /tmp/book_history.json frontend/public/data/book_history.json

      # Static SEO surface: one indexable HTML page per dispatch + archive +
      # regenerated sitemap, baked into public/ so the frontend build ships them.
      - name: Render dispatch pages
        run: python -m seiche.dispatch_pages

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (snapshot baked into dist/)
        run: |
          cd frontend
          npm ci
          npm run build

      # Primary 24/7 publish: push the built site + snapshot to the PUBLIC
      # seiche-site repo (GitHub Pages) — no tokens beyond the deploy key,
      # no user hands, survives forever on the free tier.
      - name: Publish to GitHub Pages (seiche-site)
        env:
          DEPLOY_KEY: ${{ secrets.SEICHE_SITE_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/site_key
          chmod 600 ~/.ssh/site_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/site_key -o StrictHostKeyChecking=accept-new"
          git clone --depth 1 git@github.com:beepboop2025/seiche-site.git /tmp/site || \
            (mkdir /tmp/site && cd /tmp/site && git init -b main && git remote add origin git@github.com:beepboop2025/seiche-site.git)
          rsync -a --delete --exclude .git frontend/dist/ /tmp/site/
          touch /tmp/site/.nojekyll
          cd /tmp/site
          git config user.name "seiche-publish"
          git config user.email "noreply@seiche"
          git add -A
          git diff --cached --quiet || git commit -q -m "snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
          git push -q origin main

      # Tell IndexNow (Bing, which feeds ChatGPT search) about the URLs the
      # moment they are live. Best-effort: a flaky ping never blocks a publish.
      - name: Ping IndexNow
        continue-on-error: true
        run: python backend/scripts/ping_indexnow.py

      # Secondary: Cloudflare Pages — works the day CLOUDFLARE_API_TOKEN is
      # minted; until then this step fails without failing the publish.
      - name: Deploy to Cloudflare Pages (optional)
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=seiche --branch=main
