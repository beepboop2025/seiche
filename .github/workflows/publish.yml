name: publish

# Palimpsest-style serverless publish: run the seven engines on a cron,
# bake the snapshot into the static build, deploy to Cloudflare Pages.
# Data cadence is daily, so 4-hourly snapshots lose nothing.

on:
  schedule:
    - cron: "23 2,6,10,14,18,22 * * *"   # every 4h, offset minute
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: publish
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend
        run: pip install -e "./backend[dev]"

      - name: Engine tests (publish gates on green)
        run: python -m pytest backend/tests -q

      - name: Run engines, export snapshot
        run: python backend/scripts/export_snapshot.py frontend/public/data/overview.json

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (snapshot baked into dist/)
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=seiche --branch=main
