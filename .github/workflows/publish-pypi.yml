name: publish-pypi

# Publish the seiche package to PyPI via Trusted Publishing (OIDC).
# No token anywhere: PyPI trusts this exact repo + workflow + environment
# (configured as a pending/trusted publisher on the PyPI project).
# Runs on version tags or by hand.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      id-token: write   # the OIDC handshake with PyPI
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --quiet build
          python -m build backend --outdir dist

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
